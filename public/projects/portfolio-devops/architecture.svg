  <text x="999" y="264" text-anchor="middle" font-size="9" fill="#9f1239">update inventory.ini</text>
  <rect x="930" y="278" width="138" height="30" rx="6" fill="#ffe4e6" stroke="#f43f5e" stroke-width="1"/>
  <text x="999" y="290" text-anchor="middle" font-size="9" fill="#9f1239">playbook.yml</text>
  <text x="999" y="302" text-anchor="middle" font-size="9" fill="#9f1239">Docker · kubectl · az CLI</text>
  <rect x="930" y="316" width="138" height="22" rx="6" fill="#fecdd3" stroke="#f43f5e" stroke-width="1"/>
  <text x="999" y="331" text-anchor="middle" font-size="9" font-weight="bold" fill="#9f1239">Node Exporter (monitoring)</text>

  <!-- ══════════════════════════════════════════════
       ROW 3 — Azure Resource Group
  ══════════════════════════════════════════════ -->

  <!-- Azure Resource Group wrapper -->
  <rect x="30" y="375" width="1050" height="260" rx="14" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <text x="555" y="396" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">Azure Resource Group — rg-portfolio-dev</text>
  <text x="555" y="412" text-anchor="middle" font-size="10" fill="#059669">Provisioned by Terraform · eastus</text>

  <!-- VNet -->
  <rect x="50" y="420" width="200" height="200" rx="10" fill="#ecfdf5" stroke="#34d399" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="150" y="438" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">Azure VNet</text>
  <text x="150" y="452" text-anchor="middle" font-size="9" fill="#059669">10.0.0.0/16</text>

  <!-- Bastion subnet -->
  <rect x="62" y="460" width="170" height="70" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="147" y="476" text-anchor="middle" font-size="10" font-weight="bold" fill="#065f46">Bastion Host</text>
  <text x="147" y="490" text-anchor="middle" font-size="9" fill="#059669">Ubuntu VM</text>
  <text x="147" y="503" text-anchor="middle" font-size="9" fill="#059669">Docker · kubectl · az CLI</text>
  <text x="147" y="516" text-anchor="middle" font-size="9" fill="#059669">Node Exporter :9100</text>

  <!-- AKS subnet -->
  <rect x="62" y="540" width="170" height="68" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="147" y="556" text-anchor="middle" font-size="10" font-weight="bold" fill="#065f46">AKS Subnet</text>
  <text x="147" y="570" text-anchor="middle" font-size="9" fill="#059669">aks-portfolio-dev</text>
  <text x="147" y="583" text-anchor="middle" font-size="9" fill="#059669">System node pool</text>
  <text x="147" y="596" text-anchor="middle" font-size="9" fill="#059669">RBAC enabled</text>

  <!-- AKS Cluster -->
  <rect x="270" y="420" width="340" height="200" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="440" y="438" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">AKS Cluster — aks-portfolio-dev</text>

