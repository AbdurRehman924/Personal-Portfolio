<svg viewBox="0 0 1100 820" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="1100" height="820" fill="#f8fafc"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Azure DevOps Pipeline — Portfolio-Devops</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#64748b">AKS · ACR · Key Vault · OPA Policy-as-Code · Ansible · GitHub Actions</text>

  <!-- ── LEGEND ── -->
  <rect x="20" y="72" width="12" height="12" rx="2" fill="#3b82f6"/>
  <text x="36" y="83" font-size="11" fill="#475569">CI/CD Flow</text>
  <rect x="110" y="72" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="126" y="83" font-size="11" fill="#475569">Azure Resources</text>
  <rect x="230" y="72" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="246" y="83" font-size="11" fill="#475569">Policy / Security</text>
  <rect x="360" y="72" width="12" height="12" rx="2" fill="#8b5cf6"/>
  <text x="376" y="83" font-size="11" fill="#475569">Config Mgmt</text>

  <!-- ══════════════════════════════════════════════
       ROW 1 — Developer + Git Push
  ══════════════════════════════════════════════ -->

  <!-- Developer -->
  <rect x="30" y="105" width="110" height="60" rx="10" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="85" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#0369a1">Developer</text>
  <text x="85" y="148" text-anchor="middle" font-size="10" fill="#0369a1">git push</text>

  <!-- Arrow: Dev → GitHub -->
  <line x1="140" y1="135" x2="195" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- GitHub Repo -->
  <rect x="195" y="105" width="130" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="260" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#f1f5f9">GitHub</text>
  <text x="260" y="144" text-anchor="middle" font-size="10" fill="#94a3b8">Portfolio-Devops</text>
  <text x="260" y="158" text-anchor="middle" font-size="9" fill="#64748b">main branch</text>

  <!-- Arrow: GitHub → 4 Pipelines label -->
  <line x1="325" y1="135" x2="390" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="357" y="128" text-anchor="middle" font-size="9" fill="#3b82f6">path triggers</text>

  <!-- 4 Pipelines box -->
  <rect x="390" y="95" width="680" height="80" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="730" y="113" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">4 Parallel GitHub Actions Pipelines (path-triggered)</text>

  <!-- Pipeline 1 -->
  <rect x="405" y="118" width="145" height="44" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="477" y="136" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">① Infrastructure</text>
  <text x="477" y="150" text-anchor="middle" font-size="9" fill="#3b82f6">infrastructure/**</text>

  <!-- Pipeline 2 -->
  <rect x="562" y="118" width="145" height="44" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="634" y="136" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">② App Build</text>
  <text x="634" y="150" text-anchor="middle" font-size="9" fill="#3b82f6">app/**</text>

  <!-- Pipeline 3 -->
  <rect x="719" y="118" width="145" height="44" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="791" y="136" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">③ Docker Build</text>
  <text x="791" y="150" text-anchor="middle" font-size="9" fill="#3b82f6">docker/**</text>

  <!-- Pipeline 4 -->
  <rect x="876" y="118" width="180" height="44" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="966" y="136" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">④ Ansible / K8s Deploy</text>
  <text x="966" y="150" text-anchor="middle" font-size="9" fill="#3b82f6">ansible/** · kubernetes/**</text>

  <!-- ══════════════════════════════════════════════
       ROW 2 — Infrastructure Pipeline Detail
  ══════════════════════════════════════════════ -->

  <!-- Infra pipeline steps -->
  <rect x="30" y="215" width="500" height="130" rx="10" fill="#fefce8" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="280" y="233" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">① Infrastructure Pipeline — Validate → OPA Policy Check → Deploy</text>

  <!-- Step boxes inside -->
  <rect x="45" y="242" width="110" height="50" rx="7" fill="#fff7ed" stroke="#f59e0b" stroke-width="1"/>
  <text x="100" y="262" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">tf fmt / init</text>
  <text x="100" y="276" text-anchor="middle" font-size="9" fill="#b45309">validate / plan</text>
  <text x="100" y="288" text-anchor="middle" font-size="9" fill="#b45309">save artifact</text>

  <line x1="155" y1="267" x2="175" y2="267" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <rect x="175" y="242" width="130" height="50" rx="7" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="240" y="260" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">OPA Policy Check</text>
  <text x="240" y="274" text-anchor="middle" font-size="9" fill="#b45309">aks-security.rego</text>
  <text x="240" y="286" text-anchor="middle" font-size="9" fill="#b45309">naming-convention.rego</text>

  <line x1="305" y1="267" x2="325" y2="267" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <rect x="325" y="242" width="110" height="50" rx="7" fill="#fff7ed" stroke="#f59e0b" stroke-width="1"/>
  <text x="380" y="262" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">tf apply</text>
  <text x="380" y="276" text-anchor="middle" font-size="9" fill="#b45309">main branch only</text>
  <text x="380" y="288" text-anchor="middle" font-size="9" fill="#b45309">env: production</text>

  <!-- OPA Rules callout -->
  <rect x="45" y="300" width="460" height="38" rx="6" fill="#fffbeb" stroke="#fbbf24" stroke-width="1"/>
  <text x="275" y="315" text-anchor="middle" font-size="9" font-weight="bold" fill="#92400e">OPA Rules: no public AKS API · no 0.0.0.0/0 · mandatory Environment+Project tags · naming conventions (-rg, -aks, acr[n])</text>
  <text x="275" y="330" text-anchor="middle" font-size="9" fill="#b45309">Violations → pipeline fails before any resource is created</text>

  <!-- ══════════════════════════════════════════════
       ROW 2 — App + Docker + Ansible pipelines
  ══════════════════════════════════════════════ -->

  <!-- App Build pipeline -->
  <rect x="548" y="215" width="175" height="130" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="635" y="233" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">② App Build</text>
  <rect x="560" y="240" width="150" height="30" rx="6" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
  <text x="635" y="252" text-anchor="middle" font-size="9" fill="#065f46">Node 18 · npm ci</text>
  <text x="635" y="264" text-anchor="middle" font-size="9" fill="#065f46">npm test --coverage</text>
  <rect x="560" y="278" width="150" height="30" rx="6" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
  <text x="635" y="290" text-anchor="middle" font-size="9" fill="#065f46">npm run build</text>
  <text x="635" y="302" text-anchor="middle" font-size="9" fill="#065f46">upload artifact</text>
  <rect x="560" y="316" width="150" height="22" rx="6" fill="#bbf7d0" stroke="#10b981" stroke-width="1"/>
  <text x="635" y="331" text-anchor="middle" font-size="9" font-weight="bold" fill="#065f46">React 18 + Tailwind CSS</text>

  <!-- Docker Build pipeline -->
  <rect x="738" y="215" width="165" height="130" rx="10" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="820" y="233" text-anchor="middle" font-size="11" font-weight="bold" fill="#6b21a8">③ Docker Build</text>
  <rect x="750" y="240" width="140" height="30" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="1"/>
  <text x="820" y="252" text-anchor="middle" font-size="9" fill="#6b21a8">az acr build</text>
  <text x="820" y="264" text-anchor="middle" font-size="9" fill="#6b21a8">multi-stage Dockerfile</text>
  <rect x="750" y="278" width="140" height="30" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="1"/>
  <text x="820" y="290" text-anchor="middle" font-size="9" fill="#6b21a8">push to ACR</text>
  <text x="820" y="302" text-anchor="middle" font-size="9" fill="#6b21a8">tag: portfolio:$SHA</text>
  <rect x="750" y="316" width="140" height="22" rx="6" fill="#e9d5ff" stroke="#a855f7" stroke-width="1"/>
  <text x="820" y="331" text-anchor="middle" font-size="9" font-weight="bold" fill="#6b21a8">nginx:alpine final image</text>

  <!-- Ansible pipeline -->
  <rect x="918" y="215" width="162" height="130" rx="10" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="999" y="233" text-anchor="middle" font-size="11" font-weight="bold" fill="#9f1239">④ Ansible</text>
  <rect x="930" y="240" width="138" height="30" rx="6" fill="#ffe4e6" stroke="#f43f5e" stroke-width="1"/>
