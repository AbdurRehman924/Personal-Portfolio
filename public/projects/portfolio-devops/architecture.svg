  <text x="362" y="488" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">Deployment</text>
  <text x="362" y="502" text-anchor="middle" font-size="9" fill="#1d4ed8">portfolio-app</text>
  <text x="362" y="515" text-anchor="middle" font-size="9" fill="#1d4ed8">2 replicas · nginx</text>

  <!-- Service -->
  <rect x="447" y="472" width="140" height="55" rx="6" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <text x="517" y="488" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">Service</text>
  <text x="517" y="502" text-anchor="middle" font-size="9" fill="#1d4ed8">LoadBalancer</text>
  <text x="517" y="515" text-anchor="middle" font-size="9" fill="#1d4ed8">port 80</text>

  <!-- ServiceAccount + RBAC -->
  <rect x="292" y="535" width="295" height="62" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="440" y="551" text-anchor="middle" font-size="10" font-weight="bold" fill="#3730a3">RBAC</text>
  <text x="440" y="565" text-anchor="middle" font-size="9" fill="#4338ca">ServiceAccount: portfolio-sa</text>
  <text x="440" y="578" text-anchor="middle" font-size="9" fill="#4338ca">Role: get/list/watch pods, services, deployments</text>

  <!-- ACR -->
  <rect x="630" y="420" width="200" height="90" rx="10" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="730" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#6b21a8">ACR</text>
  <text x="730" y="456" text-anchor="middle" font-size="10" fill="#7e22ce">acrportfoliodev</text>
  <text x="730" y="470" text-anchor="middle" font-size="9" fill="#7e22ce">portfolio:$SHA</text>
  <text x="730" y="484" text-anchor="middle" font-size="9" fill="#7e22ce">Basic SKU · admin enabled</text>
  <text x="730" y="498" text-anchor="middle" font-size="9" fill="#7e22ce">AKS pull integration</text>

  <!-- Key Vault -->
  <rect x="630" y="525" width="200" height="100" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="730" y="545" text-anchor="middle" font-size="12" font-weight="bold" fill="#9a3412">Key Vault</text>
  <text x="730" y="561" text-anchor="middle" font-size="10" fill="#c2410c">kv-portfolio-dev</text>
  <text x="730" y="577" text-anchor="middle" font-size="9" fill="#c2410c">ARM_CLIENT_SECRET</text>
  <text x="730" y="591" text-anchor="middle" font-size="9" fill="#c2410c">SSH_PRIVATE_KEY</text>
  <text x="730" y="605" text-anchor="middle" font-size="9" fill="#c2410c">AZURE_CREDENTIALS</text>

  <!-- GitHub Secrets -->
  <rect x="850" y="420" width="210" height="200" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="955" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#f1f5f9">GitHub Secrets</text>
  <text x="955" y="458" text-anchor="middle" font-size="9" fill="#94a3b8">ARM_CLIENT_ID</text>
  <text x="955" y="472" text-anchor="middle" font-size="9" fill="#94a3b8">ARM_CLIENT_SECRET</text>
  <text x="955" y="486" text-anchor="middle" font-size="9" fill="#94a3b8">ARM_SUBSCRIPTION_ID</text>
  <text x="955" y="500" text-anchor="middle" font-size="9" fill="#94a3b8">ARM_TENANT_ID</text>
  <text x="955" y="514" text-anchor="middle" font-size="9" fill="#94a3b8">TF_API_TOKEN</text>
  <text x="955" y="528" text-anchor="middle" font-size="9" fill="#94a3b8">AZURE_CREDENTIALS</text>
  <text x="955" y="542" text-anchor="middle" font-size="9" fill="#94a3b8">SSH_PRIVATE_KEY</text>
  <text x="955" y="556" text-anchor="middle" font-size="9" fill="#94a3b8">BASTION_IP</text>
  <line x1="870" y1="566" x2="1050" y2="566" stroke="#334155" stroke-width="1"/>
  <text x="955" y="582" text-anchor="middle" font-size="9" font-weight="bold" fill="#60a5fa">Injected at runtime</text>
  <text x="955" y="596" text-anchor="middle" font-size="9" fill="#60a5fa">never in source code</text>

  <!-- ══════════════════════════════════════════════
       ROW 4 — Terraform Cloud
  ══════════════════════════════════════════════ -->
  <rect x="30" y="650" width="500" height="60" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="280" y="672" text-anchor="middle" font-size="12" font-weight="bold" fill="#4c1d95">Terraform Cloud</text>
  <text x="280" y="690" text-anchor="middle" font-size="10" fill="#6d28d9">Remote state backend · TF_API_TOKEN auth · plan artifact passed between jobs</text>

  <!-- Terraform modules callout -->
  <rect x="548" y="650" width="532" height="60" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
  <text x="814" y="672" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">Terraform Modules</text>
  <text x="814" y="690" text-anchor="middle" font-size="10" fill="#059669">resource-group · networking (VNet/subnet) · aks · container-registry · key-vault</text>

  <!-- ══════════════════════════════════════════════
       ARROWS — pipelines → azure resources
  ══════════════════════════════════════════════ -->

  <!-- Infra pipeline → Terraform Cloud -->
  <line x1="380" y1="345" x2="280" y2="650" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>

  <!-- Docker pipeline → ACR -->
  <line x1="820" y1="345" x2="730" y2="420" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- K8s deploy → AKS -->
  <line x1="966" y1="345" x2="500" y2="448" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Ansible → Bastion -->
  <line x1="999" y1="345" x2="147" y2="460" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>

  <!-- ACR → AKS (image pull) -->
  <line x1="630" y1="460" x2="610" y2="490" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-purple)"/>

  <!-- ══════════════════════════════════════════════
       ARROW MARKERS
  ══════════════════════════════════════════════ -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
